name: UniSync CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  validate:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Root Dependencies
        run: npm ci

        # Append this to the 'validate' job steps
      - name: Install Backend Dependencies
        run: npm ci --prefix backend

      - name: Run Backend Tests
        run: npm test --prefix backend
        env:
          JWT_SECRET: "test-secret"
          PORT: 3001

          # Append this to the 'validate' job steps
      - name: Install Frontend Dependencies
        run: npm ci --prefix frontend

      - name: Run Frontend Linting
        run: npm run lint --prefix frontend

        # Add this as a new job at the same hierarchy level as 'validate'
  deploy-backend:
    name: Deploy Backend to EC2
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: "ubuntu"
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            cd /home/ubuntu/UniSync
            git pull origin main
            
            # Install and build backend
            npm install --prefix backend
            npm run build --prefix backend
            
            # Restart backend
            pm2 restart unisync-backend || pm2 start backend/dist/index.js --name "unisync-backend"