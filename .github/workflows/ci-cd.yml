name: UniSync CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  test-backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Root Dependencies
        run: npm ci

      - name: Install Backend Dependencies
        run: npm ci --prefix backend

      - name: Run Backend Tests
        run: npm test --prefix backend
        env:
          JWT_SECRET: "test-secret"
          PORT: 3001

  test-frontend:
    name: Frontend Lint & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Root Dependencies
        run: npm ci

      - name: Install Frontend Dependencies
        run: npm ci --prefix frontend

      - name: Run Frontend Linting
        run: npm run lint --prefix frontend

  deploy-backend:
    name: Deploy Backend to EC2 (Docker)
    needs: [test-backend, test-frontend]
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_PUBLIC_IP }}
          username: "ubuntu"
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            if [ ! -d "/home/ubuntu/UniSync" ]; then
              git clone https://github.com/Ntharusha/UniSync.git /home/ubuntu/UniSync
            fi
            cd /home/ubuntu/UniSync
            git fetch origin
            git checkout ${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}
            
            # Build backend Docker image
            sudo docker build -t unisync-backend ./backend
            
            # Stop and remove existing container if running
            sudo docker stop unisync-backend || true
            sudo docker rm unisync-backend || true
            
            # Run the new container
            sudo docker run -d --name unisync-backend \
              -p 3001:3001 \
              -e PORT=3001 \
              -e NODE_ENV=production \
              -e MONGODB_URI="${{ secrets.MONGODB_URI }}" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              --restart unless-stopped \
              unisync-backend