name: UniSync CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  validate:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Root Dependencies
        run: npm ci

        # Append this to the 'validate' job steps
      - name: Install Backend Dependencies
        run: npm ci --prefix backend

      - name: Run Backend Tests
        run: npm test --prefix backend
        env:
          JWT_SECRET: "test-secret"
          PORT: 3001

          # Append this to the 'validate' job steps
      - name: Install Frontend Dependencies
        run: npm ci --prefix frontend

      - name: Run Frontend Linting
        run: npm run lint --prefix frontend

        # Add this as a new job at the same hierarchy level as 'validate'
  deploy-backend:
    name: Deploy Backend to EC2
    needs: validate
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: "ubuntu"
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            if [ ! -d "/home/ubuntu/UniSync" ]; then
              git clone https://github.com/Ntharusha/UniSync.git /home/ubuntu/UniSync
            fi
            cd /home/ubuntu/UniSync
            git fetch origin
            git checkout ${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}
            
            # Create production .env file
            echo "PORT=3001" > backend/.env
            echo "NODE_ENV=production" >> backend/.env
            echo "MONGODB_URI=${{ secrets.MONGODB_URI }}" >> backend/.env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> backend/.env
            
            # Restart backend
            npm install --prefix backend
            pm2 restart unisync-backend || pm2 start backend/dist/index.js --name "unisync-backend"