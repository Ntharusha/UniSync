version: '3.8'

services:
  # Local MongoDB database service
  mongodb:
    image: mongo:6.0
    container_name: unisync_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - unisync_network

  # Backend Express application service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: unisync_backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MONGODB_URI=mongodb://mongodb:27017/unisync
      - JWT_SECRET=supersecretjwtkeyforunisync
      - NODE_ENV=production
    depends_on:
      - mongodb
    networks:
      - unisync_network

volumes:
  mongo_data:

networks:
  unisync_network:
    driver: bridge
