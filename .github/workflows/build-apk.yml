name: Build Mobile Android APK

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch: # Allows manual trigger from GitHub Actions UI

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Install mobile dependencies
      - name: Install Mobile Dependencies
        run: |
          cd mobile
          npm install --legacy-peer-deps

      # Generate Android Native project folders
      - name: Expo Prebuild
        run: |
          cd mobile
          npx expo prebuild --platform android --no-install

      # Set executable permissions on Gradle Wrapper
      - name: Set Gradle permissions
        run: chmod +x mobile/android/gradlew

      # Build Debug APK (Debug APK is perfect for testing without code signing keys)
      - name: Build Android APK
        run: |
          cd mobile/android
          ./gradlew assembleDebug --no-daemon

      # Upload the APK file as a GitHub Actions Build Artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: UniSync-Android-App-Debug
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
