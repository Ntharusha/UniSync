name: UniSync CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  validate:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # Root Level Checks
      - name: Install Root Dependencies
        run: npm ci

      # Backend Validations
      - name: Install Backend Dependencies
        run: npm ci --prefix backend

      - name: Run Backend Tests
        run: npm test --prefix backend
        env:
          JWT_SECRET: "test-secret"
          PORT: 3001

      # Backend Compilation Check
      - name: Build Backend
        run: npm run build --prefix backend

      # Frontend Validations
      - name: Install Frontend Dependencies
        run: npm ci --prefix frontend

      - name: Run Frontend Linting
        run: npm run lint --prefix frontend

      # Frontend Compilation Check
      - name: Build Frontend
        run: npm run build --prefix frontend

  publish-images:
    name: Build & Push to Docker Hub
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/unisync-backend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/unisync-backend:${{ github.sha }}

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/unisync-frontend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/unisync-frontend:${{ github.sha }}

  deploy:
    name: Deploy Stack to EC2
    needs: publish-images
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: "ubuntu"
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            cd /home/ubuntu/UniSync
            git pull origin main
            
            # Configure DOCKER_HUB_USERNAME in .env for Docker Compose
            echo "DOCKER_HUB_USERNAME=${{ secrets.DOCKER_HUB_USERNAME }}" > .env
            
            # Log in to Docker Hub
            echo "${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}" | docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin
            
            # Pull latest images from Docker Hub
            docker compose pull
            
            # Restart all containers in detached mode
            docker compose up -d
